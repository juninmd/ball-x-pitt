name: Deploy Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  buildForPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - WebGL
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: NeonDefense-${{ matrix.targetPlatform }}

      - name: Zip Artifacts
        run: |
          cd build/${{ matrix.targetPlatform }}
          zip -r ../../NeonDefense-${{ matrix.targetPlatform }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonDefense-${{ matrix.targetPlatform }}
          path: NeonDefense-${{ matrix.targetPlatform }}.zip

  release:
    name: Create Release
    needs: buildForPlatforms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/NeonDefense-StandaloneWindows64/NeonDefense-StandaloneWindows64.zip
            artifacts/NeonDefense-WebGL/NeonDefense-WebGL.zip
