name: Deploy Unity Project 🚀

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }} 🎮
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - WebGL
    steps:
      - name: Checkout Repository 🛒
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library 🗄️
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Run Unity Build 🏗️
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}

      - name: Upload Build Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  release:
    name: Create GitHub Release 📦
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository 🛒
        uses: actions/checkout@v4

      - name: Download Windows Build 📥
        uses: actions/download-artifact@v4
        with:
          name: Build-StandaloneWindows64
          path: build/StandaloneWindows64

      - name: Download WebGL Build 📥
        uses: actions/download-artifact@v4
        with:
          name: Build-WebGL
          path: build/WebGL

      - name: Zip Builds 🗜️
        run: |
          cd build
          zip -r NeonDefense-Windows64.zip StandaloneWindows64/
          zip -r NeonDefense-WebGL.zip WebGL/

      - name: Create Release 🚀
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/NeonDefense-Windows64.zip
            build/NeonDefense-WebGL.zip
