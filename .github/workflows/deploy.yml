name: Game-CI Deploy Workflow 🚀

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0, v1.1, etc.

jobs:
  buildWindows:
    name: Build for Windows 🖥️
    runs-on: ubuntu-latest
    steps:
      - name: Free up runner disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-StandaloneWindows64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-StandaloneWindows64-
            Library-

      - name: Build Windows
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: BallXPitt-Windows
          buildsPath: Builds

      - name: Zip Windows Build
        run: zip -r BallXPitt-Windows.zip Builds/StandaloneWindows64

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-Windows
          path: BallXPitt-Windows.zip

  buildWebGL:
    name: Build for WebGL 🌐
    runs-on: ubuntu-latest
    steps:
      - name: Free up runner disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: BallXPitt-WebGL
          buildsPath: Builds

      - name: Zip WebGL Build
        run: zip -r BallXPitt-WebGL.zip Builds/WebGL

      - name: Upload WebGL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-WebGL
          path: BallXPitt-WebGL.zip

  release:
    name: Create GitHub Release 📦
    needs: [buildWindows, buildWebGL]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Build-Windows
          path: ./releases

      - name: Download WebGL Artifact
        uses: actions/download-artifact@v4
        with:
          name: Build-WebGL
          path: ./releases

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./releases/BallXPitt-Windows.zip
            ./releases/BallXPitt-WebGL.zip
